<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="https://iili.io/Bu9qAdB.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title> AURADE | Monster Under My Bed </title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0c12;
      font-family: 'Outfit', 'Manrope', 'Segoe UI', sans-serif;
      color: #d9e2f5;
      line-height: 1.6;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,77,109,.12), transparent 30%),
        radial-gradient(circle at 85% 30%, rgba(120,140,255,.12), transparent 35%),
        #070910;
    }

    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.045em;
    }

    /* ===== ANIMATED SYMBOL ===== */
    .aura-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: .9em;
      height: .9em;
      flex: 0 0 .9em;
      position: relative;
      margin: 0 .12em;
      color: #ff4d6d;
      filter: drop-shadow(0 0 15px rgba(255,77,109,.8));
    }

    .aura-symbol::before {
      content: "✦";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8em;
      line-height: 1;
      animation: straightSpin 4s linear infinite;
      transform-origin: center center;
      filter: drop-shadow(0 0 8px #ff4d6d) drop-shadow(0 0 20px rgba(255,77,109,.8));
    }

    .aura-symbol::after {
      content: "";
      position: absolute;
      width: 90%;
      height: 90%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(255,77,109,.35);
      animation: ringPulse 2.2s ease-out infinite;
    }

    @keyframes straightSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes ringPulse {
      0% {
        transform: translate(-50%, -50%) scale(.7);
        opacity: .8;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.7);
        opacity: 0;
      }
    }

    /* ===== PREMIUM NAVIGATION ===== */
    .site-header {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1200px, calc(100% - 40px));
      padding: 14px 24px;
      background: linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px rgba(255,255,255,.08);
      z-index: 1000;
      transition: opacity .4s ease, transform .4s ease;
    }

    .site-header.nav-hidden {
      transform: translate(-50%, -130%);
      opacity: 0;
      pointer-events: none;
    }

    .site-header.outside-hero {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(-30px);
    }

    .header-inner {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      display: none;
    }

    .nav-links ul {
      display: flex;
      align-items: center;
      gap: 12px;
      list-style: none;
      justify-content: center;
    }

    .nav-links a {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 22px;
      border-radius: 999px;
      color: #e8edff;
      font-family: 'Manrope', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: .35s ease;
    }

    .nav-links a::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,77,109,.25), rgba(154,169,255,.18));
      opacity: 0;
      transform: scale(.8);
      transition: .35s ease;
      z-index: -1;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: white;
      transform: translateY(-2px);
    }

    .nav-links a:hover::before,
    .nav-links a.active::before {
      opacity: 1;
      transform: scale(1);
    }

    .burger,
    .menu-toggle,
    .mobile-menu-button,
    .hamburger {
      display: none !important;
    }

    @media (max-width: 768px) {
      .site-header {
        top: 10px;
        width: calc(100% - 20px);
        padding: 12px 18px;
        overflow: visible;
      }

      .nav-links {
        display: block !important;
        width: 100%;
      }

      .nav-links ul {
        display: flex !important;
        justify-content: center;
        align-items: center;
        gap: 6px;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 0;
      }

      .nav-links ul::-webkit-scrollbar {
        display: none;
      }

      .nav-links a {
        white-space: nowrap;
        padding: 9px 14px;
        font-size: .82rem;
      }

      .burger {
        display: none !important;
      }
    }

    /* ===== HERO SECTION ===== */
    .hero {
      position: relative;
      min-height: 78vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 6rem 2rem 5rem;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      background-image: url('https://iili.io/CwM85Dx.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
      filter: saturate(1.15) contrast(1.05);
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(180deg, rgba(5,7,12,.35), rgba(5,7,12,.85)),
        radial-gradient(circle at center, transparent, rgba(0,0,0,.45));
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 1000px;
    }

    .hero h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .18em;
      font-size: clamp(2.5rem, 6vw, 4.2rem);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(180deg, #ffffff 0%, #dce4ff 45%, #ff9aae 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 35px rgba(255,255,255,.08), 0 20px 60px rgba(0,0,0,.5);
      margin-bottom: 1rem;
      flex-wrap: wrap;
      text-align: center;
    }

    .hero h1 .aura-symbol {
      color: #ff4d6d;
      background: none;
      filter: drop-shadow(0 0 15px rgba(255,77,109,.8));
    }

    .hero p {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: .08em;
      color: #c7d0e5;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .hero-tag {
      margin-top: 2rem;
      display: inline-block;
      background: rgba(255,77,109,0.2);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ff9aae;
    }

    /* ===== DIVIDER ===== */
    .hero-divider {
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ffffff, #ff4d6d, #ffffff, transparent);
      position: relative;
      z-index: 5;
      box-shadow: 0 0 25px rgba(255,77,109,.5);
    }

    /* ===== MAIN CONTENT ===== */
    .case-content {
      padding: 4rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .coming-soon-wrapper {
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2rem;
    }

    .coming-soon-wrapper h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      background: linear-gradient(180deg, #ffffff 0%, #dce4ff 45%, #ff9aae 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(255,77,109,0.3);
      letter-spacing: 0.05em;
    }

    .coming-soon-wrapper p {
      font-size: 1.2rem;
      color: #b9c3e6;
      letter-spacing: 0.1em;
      font-weight: 300;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      color: #ff4d6d;
      text-decoration: none;
      font-weight: 600;
      font-family: 'Manrope', sans-serif;
      transition: 0.2s;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      border: 1px solid rgba(255,77,109,0.3);
      background: rgba(255,77,109,0.05);
    }

    .back-link:hover {
      color: #ffffff;
      background: rgba(255,77,109,0.2);
      border-color: #ff4d6d;
      transform: translateY(-2px);
    }

    /* ===== FOOTER ===== */
    .footer {
      background: #05070c;
      padding: 3rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.85rem;
      color: #7f8c9a;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .hero {
        padding: 5rem 1rem 4rem;
        min-height: 70vh;
      }
      .hero h1 {
        font-size: 2rem;
      }
      .case-content {
        padding: 2rem 1rem;
      }
      .coming-soon-wrapper h1 {
        font-size: clamp(2.5rem, 15vw, 4rem);
      }
      .back-link {
        padding: 0.6rem 1.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <div class="logo">
      <a href="index.html">
        <img src="https://iili.io/Bu9qAdB.png" alt="AURADE" style="height: 50px; border-radius: 10px;">
      </a>
    </div>
    <nav class="nav-links">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="portfolio.html" class="active">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="burger" id="burger" style="display:none;">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<!-- ===== HERO ===== -->
<section class="hero" id="heroSection">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Monster Under My Bed <span class="aura-symbol"></span></h1>
    <p>COMING SOON — FULL ANIMATION</p>
    <span class="hero-tag">IN PRODUCTION</span>
  </div>
</section>

<div class="hero-divider"></div>

<!-- ===== MAIN CONTENT ===== -->
<div class="case-content">
  <div class="coming-soon-wrapper">
    <h1>COMING SOON</h1>
    <p>🎬 Full animation currently in production</p>
    <a href="portfolio.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>
  </div>
</div>

<footer class="footer">
  <p>© 2026 AURADE — digital art studio.</p>
</footer>

<script>
  // ===== NAVIGATION HIDE ON SCROLL =====
  (function() {
    const header = document.getElementById('siteHeader');
    if (!header) return;
    let lastScroll = 0;

    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      if (currentScroll > lastScroll && currentScroll > 80) {
        header.classList.add('nav-hidden');
      } else {
        header.classList.remove('nav-hidden');
      }
      lastScroll = currentScroll;
    });
  })();

  // ===== NAVIGATION VISIBILITY INSIDE HERO =====
  (function() {
    const header = document.getElementById('siteHeader');
    const hero = document.getElementById('heroSection');
    if (!header || !hero) return;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          header.classList.remove('outside-hero');
        } else {
          header.classList.add('outside-hero');
        }
      });
    }, { threshold: 0.15 });

    observer.observe(hero);
  })();

  // ===== (Бургер скрыт, обработчики на всякий случай) =====
  const burger = document.getElementById('burger');
  const mobileMenu = document.getElementById('mobileMenu');
  const menuOverlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');

  function openMenu() {
    if (mobileMenu) mobileMenu.classList.add('active');
    if (menuOverlay) menuOverlay.classList.add('active');
    if (document.body) document.body.style.overflow = 'hidden';
  }

  function closeMenuFunc() {
    if (mobileMenu) mobileMenu.classList.remove('active');
    if (menuOverlay) menuOverlay.classList.remove('active');
    if (document.body) document.body.style.overflow = '';
  }

  if (burger) burger.addEventListener('click', openMenu);
  if (closeMenu) closeMenu.addEventListener('click', closeMenuFunc);
  if (menuOverlay) menuOverlay.addEventListener('click', closeMenuFunc);
</script>

</body>
</html>
