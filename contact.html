<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title> AURADE | CONTACT </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0c12;
      font-family: 'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #eef2ff;
      line-height: 1.5;
    }

    h1, h2, h3 {
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* ===== ХЕДЕР С МЕНЮ ===== */
    .site-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 1.5rem 2rem;
      background: transparent;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }

    .logo img {
      height: 50px;
      width: auto;
    }

    /* УВЕЛИЧЕННЫЕ КНОПКИ МЕНЮ */
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: #eef2ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 0.6rem 1.2rem;
      transition: 0.2s;
      border-radius: 40px;
      letter-spacing: 0.5px;
    }

    .nav-links a:hover {
      color: #ff4d6d;
      background: rgba(255, 77, 109, 0.15);
    }

    .nav-links a.active {
      color: #ff4d6d;
      background: rgba(255, 77, 109, 0.2);
      border: 1px solid rgba(255, 77, 109, 0.3);
    }

    .burger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 6px;
    }

    .burger span {
      width: 28px;
      height: 3px;
      background: #eef2ff;
      transition: 0.3s;
      border-radius: 3px;
    }

    /* Мобильное меню (с размытием фона) */
    .mobile-menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      max-width: 320px;
      height: 100vh;
      background: rgba(10, 12, 18, 0.98);
      backdrop-filter: blur(12px);
      z-index: 200;
      transition: 0.3s;
      padding: 6rem 2rem;
      box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
    }

    .mobile-menu.active {
      right: 0;
    }

    .mobile-menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .mobile-menu a {
      color: #eef2ff;
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 0.8rem 1rem;
      display: block;
      transition: 0.2s;
      border-radius: 40px;
    }

    .mobile-menu a:hover,
    .mobile-menu a.active {
      color: #ff4d6d;
      background: rgba(255, 77, 109, 0.15);
    }

    .close-menu {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 2.2rem;
      cursor: pointer;
      color: #eef2ff;
      transition: 0.2s;
    }

    .close-menu:hover {
      color: #ff4d6d;
    }

    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 150;
      display: none;
    }

    .menu-overlay.active {
      display: block;
    }

    /* Hero-секция */
    .hero {
      position: relative;
      min-height: 55vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 7rem 2rem 5rem;
      overflow: hidden;
    }

    .hero-parallax-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      background-image: url('https://iili.io/BTylXwJ.png');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      z-index: 0;
      transform: translateY(0);
      will-change: transform;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 100%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 1000px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 4.8rem);
      background: linear-gradient(135deg, #FFFFFF, #9aa9ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .hero h1 span {
      background: none;
      color: #ff4d6d;
    }

    .hero p {
      font-size: 1.2rem;
      margin-top: 1rem;
      color: #ffffff;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    /* БЕЛАЯ РАЗДЕЛИТЕЛЬНАЯ ЛИНИЯ */
    .hero-divider {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffffff, #ff4d6d, #ffffff, transparent);
      position: relative;
      z-index: 5;
    }

    /* Секция контактов */
    .contact-section {
      padding: 5rem 2rem;
      background: #0a0c12;
      position: relative;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .contact-card {
      background: rgba(18, 22, 35, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.25s ease;
    }

    .contact-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 77, 109, 0.4);
      box-shadow: 0 25px 40px -12px #ff4d6d20;
    }

    .contact-icon {
      font-size: 3rem;
      color: #ff4d6d;
      margin-bottom: 1.5rem;
    }

    .contact-email {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .contact-email a {
      color: #ff4d6d;
      text-decoration: none;
      transition: 0.2s;
    }

    .contact-email a:hover {
      color: #ffffff;
    }

    .contact-note {
      font-size: 0.9rem;
      color: #b9c3e6;
      margin-top: 1rem;
    }

    .footer {
      background: #05070c;
      padding: 3rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.85rem;
      color: #7f8c9a;
    }

    .social-footer {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .social-footer a {
      color: #b9c3e6;
      font-size: 1.6rem;
      transition: 0.2s;
    }

    .social-footer a:hover {
      color: #ff4d6d;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .burger {
        display: flex;
      }
      .hero {
        padding: 6rem 1rem 4rem;
      }
      .contact-section {
        padding: 3rem 1rem;
      }
      .contact-card {
        padding: 2rem 1.5rem;
      }
      .contact-email {
        font-size: 1.2rem;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>

<!-- ХЕДЕР -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <a href="index.html">
        <img src="https://iili.io/BI4EZ1s.png" alt="AURADE" style="height: 50px; border-radius: 10px;">
      </a>
    </div>
    <nav class="nav-links">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
    <div class="burger" id="burger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
  <div class="close-menu" id="closeMenu">&times;</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</div>

<!-- HERO С ПАРАЛЛАКС ФОНОМ -->
<section class="hero">
  <div class="hero-parallax-bg" id="parallaxBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>AURADE <span>✦</span> CONTACT</h1>
    <p>GET IN TOUCH WITH US</p>
    <div style="margin-top: 2rem;">
      <span style="background:#ff4d6d20; backdrop-filter: blur(4px); padding:0.4rem 1.2rem; border-radius:40px; font-size:0.8rem;">CONTACT</span>
    </div>
  </div>
</section>

<!-- БЕЛАЯ РАЗДЕЛИТЕЛЬНАЯ ЛИНИЯ -->
<div class="hero-divider"></div>

<!-- СЕКЦИЯ КОНТАКТОВ -->
<section class="contact-section">
  <div class="container">
    <div class="contact-card">
      <div class="contact-icon">
        <i class="fas fa-envelope"></i>
      </div>
      <div class="contact-email">
        <a href="mailto:Sbezon0@gmail.com">Sbezon0@gmail.com</a>
      </div>
      <div class="contact-note">
        <i class="fas fa-clock"></i> We'll get back to you within 24-48 hours
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="social-footer">
  </div>
  <p>© 2026 AURADE — digital art studio.</p>
  <p style="margin-top:0.8rem; font-size:0.7rem;"></p>
</footer>

<script>
  // ПАРАЛЛАКС ЭФФЕКТ
  const parallaxBg = document.getElementById('parallaxBg');
  window.addEventListener('scroll', () => {
    const scrolled = window.pageYOffset;
    const translateY = scrolled * 0.3;
    if (parallaxBg) parallaxBg.style.transform = `translateY(${translateY}px)`;
  });

  // МЕНЮ (бургер + размытие фона)
  const burger = document.getElementById('burger');
  const mobileMenu = document.getElementById('mobileMenu');
  const menuOverlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');

  function openMenu() {
    mobileMenu.classList.add('active');
    menuOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeMenuFunc() {
    mobileMenu.classList.remove('active');
    menuOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  burger.addEventListener('click', openMenu);
  closeMenu.addEventListener('click', closeMenuFunc);
  menuOverlay.addEventListener('click', closeMenuFunc);
</script>

</body>
</html>
